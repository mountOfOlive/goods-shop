<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f9fff"/>
      <stop offset="100%" style="stop-color:#1b64da"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 마스크용 전체 채움 배경 (어떤 모양으로 잘려도 색상 유지) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="256" cy="160" rx="200" ry="140" fill="url(#shine)"/>

  <!-- safe zone 80% 내부 (약 205~307 범위)에 그래픽 배치 -->
  <!-- 쇼핑백 몸통 (더 작게, 중앙 집중) -->
  <rect x="168" y="228" width="176" height="152" rx="15" ry="15" fill="#ffffff" opacity="0.97"/>

  <!-- 손잡이 -->
  <path d="M208 228 Q208 185 232 178 Q256 173 256 173" fill="none" stroke="#ffffff" stroke-width="15" stroke-linecap="round" opacity="0.97"/>
  <path d="M304 228 Q304 185 280 178 Q256 173 256 173" fill="none" stroke="#ffffff" stroke-width="15" stroke-linecap="round" opacity="0.97"/>

  <!-- "T" 모노그램 -->
  <text x="256" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="90" font-weight="800" fill="#3182f6" text-anchor="middle" letter-spacing="-2">T</text>
</svg>
