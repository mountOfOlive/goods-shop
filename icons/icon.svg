<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f9fff"/>
      <stop offset="100%" style="stop-color:#1b64da"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 배경 원 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- 광택 오버레이 -->
  <ellipse cx="256" cy="160" rx="180" ry="130" fill="url(#shine)"/>

  <!-- 쇼핑백 몸통 -->
  <rect x="148" y="210" width="216" height="190" rx="18" ry="18" fill="#ffffff" opacity="0.97"/>

  <!-- 쇼핑백 손잡이 (왼쪽) -->
  <path d="M196 210 Q196 155 230 148 Q256 143 256 143" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.97"/>
  <!-- 쇼핑백 손잡이 (오른쪽) -->
  <path d="M316 210 Q316 155 282 148 Q256 143 256 143" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.97"/>

  <!-- "T" 모노그램 -->
  <text x="256" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="108" font-weight="800" fill="#3182f6" text-anchor="middle" letter-spacing="-2">T</text>
</svg>
