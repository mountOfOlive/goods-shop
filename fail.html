<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>결제 실패 · turingshop</title>
  <meta name="theme-color" content="#3182f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="turingshop">
  <link rel="manifest" href="/goods-shop/manifest.json">
  <link rel="apple-touch-icon" href="/goods-shop/icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">turingshop</a>
      <nav id="nav"></nav>
    </div>
  </header>

  <div class="result-wrap">
    <div class="result-box">
      <div class="result-icon">❌</div>
      <h2>결제 실패</h2>
      <p id="fail-msg">결제가 취소되었거나 오류가 발생했습니다.</p>
      <a href="index.html" class="btn-outline">상품으로 돌아가기</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="/goods-shop/js/pwa.js"></script>
  <script>
    renderHeader();
    const params = new URLSearchParams(location.search);
    const msg = params.get("message");
    if (msg) document.getElementById("fail-msg").textContent = decodeURIComponent(msg);
  </script>
</body>
</html>
